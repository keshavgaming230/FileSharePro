<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileShare Pro - Transfer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#070b17;
    color:white;
}

.container{
    width:92%;
    max-width:1300px;
    margin:auto;
    padding:30px 0;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#00f0ff;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:25px;
    padding:30px;
    backdrop-filter:blur(20px);
}

.qr{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    margin-top:20px;
}

.qr img{
    width:100%;
    max-width:250px;
}

.dropzone{
    border:2px dashed #00f0ff;
    padding:60px 20px;
    text-align:center;
    border-radius:20px;
    margin-top:20px;
    transition:.3s;
}

.dropzone:hover{
    background:rgba(0,240,255,.05);
}

.file-input{
    display:none;
}

.btn{
    background:linear-gradient(135deg,#00f0ff,#7b2fff);
    padding:14px 25px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}

.file-list{
    margin-top:25px;
}

.file{
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,.04);
    margin-bottom:12px;
}

@media(max-width:900px){

.grid{
    grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="logo">⚡ FileShare Pro</div>
<div>{{ ip }}:{{ port }}</div>
</div>

<div class="grid">

<div class="card">

<h2>📱 Connect Mobile</h2>

<div class="qr">
<img src="{{ qr_code }}" alt="QR">
</div>

<p style="margin-top:20px;color:#aaa;">
Scan this QR code using your mobile browser
</p>

</div>

<div class="card">

<h2>📤 Upload Files</h2>

<div class="dropzone" onclick="document.getElementById('fileInput').click()">

<h3>Drag & Drop Files Here</h3>

<p style="margin-top:15px;color:#aaa;">
or click to browse
</p>

<input type="file" id="fileInput" class="file-input" multiple>

<button class="btn">Choose Files</button>

</div>

<div class="file-list" id="fileList"></div>

</div>

</div>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

fileInput.addEventListener("change", async (e)=>{

const files = e.target.files;

const formData = new FormData();

for(let file of files){
    formData.append("file", file);

    fileList.innerHTML += `
    <div class="file">
        📄 ${file.name}
    </div>
    `;
}

await fetch("/api/upload",{
    method:"POST",
    body:formData
});

alert("Files uploaded successfully!");

});

</script>

</body>
</html>
